name: deploy #工作流名称

on:
    push: #push时触发
    workflow_dispatch: #允许在github action手动触发
    # schedule: #定时任务
        # Runs everyday at 8:00 AM
        # - cron: "0 0 * * *"

jobs:
    build: #作业id
        runs-on: ubuntu-latest #在ubuntu最新版作业
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: true #递归检出所有子模块
                  fetch-depth: 0 #获取完整提交历史（用于子模块）

            - name: Setup Hugo
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: "latest"
                  extended: true
            
            - name: Fix Submodules
              run: git submodule update --init --recursive

            - name: Build Web
              run: hugo

            - name: Deploy Web
              uses: peaceiris/actions-gh-pages@v3
              with:
                  PERSONAL_TOKEN: ${{ secrets.BLOG }}
                  EXTERNAL_REPOSITORY: ha7m010/ha7m010.github.io
                  PUBLISH_BRANCH: main
                  PUBLISH_DIR: ./public
                  commit_message: ${{ github.event.head_commit.message }}
                  # cname: www.YOUR_DOMAIN.com
