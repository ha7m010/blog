baseurl: "https://ha7m010.github.io/"
languageCode: "en-US"
title: "ham's blog"
theme: "hugo-paged"
ignoreFiles: ["\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
footnotereturnlinkcontents: "↩"

outputs:
  home: [html, rss, json]

menu:
  main:
    - name: Github
      url: "https://github.com/yihui/hugo-paged"
      weight: 10
      params:
        class: [optional]

params:
  description: "A website built through Hugo with the hugo-paged theme."
  logo:
    en:
      alt: 观测站
      img: # a path to the logo
  footer: "&copy; [Yihui Xie](https://yihui.org) {Year}"

markup:
  highlight:
    codeFences: false
  goldmark:
    renderer:
      unsafe: true


        data-repo="ha7m010/ha7m010.github.io"
        data-repo-id="R_kgDOPbwP4w"
        data-category="comments"
        data-category-id="DIC_kwDOPbwP484CuB1C"
        data-mapping="title"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="preferred_color_scheme"
        data-lang="zh-CN"
        crossorigin="anonymous"

